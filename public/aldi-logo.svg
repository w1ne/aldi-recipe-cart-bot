<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 132" width="200" height="132" role="img" aria-label="ALDI">
  <title>ALDI</title>
  <!-- Signature multi-color arc sweeping over the wordmark:
       light blue, blue, orange, red — the classic ALDI bars curved as an arc. -->
  <g fill="none" stroke-linecap="butt">
    <path d="M14 56 A92 92 0 0 1 186 56" stroke="#41b6e6" stroke-width="11"/>
    <path d="M18.5 44.5 A86 86 0 0 1 181.5 44.5" stroke="#001e64" stroke-width="11"/>
    <path d="M23 33.5 A80 80 0 0 1 177 33.5" stroke="#f29400" stroke-width="11"/>
    <path d="M27.5 23 A74 74 0 0 1 172.5 23" stroke="#d2232a" stroke-width="11"/>
  </g>
  <!-- ALDI wordmark in brand navy -->
  <text x="100" y="120" text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="58" font-weight="800" letter-spacing="2"
        fill="#00005f">ALDI</text>
</svg>
