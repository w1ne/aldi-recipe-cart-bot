# Cloudflare Pages config. The AI SDK streaming path pulls in a few deps that
# expect Node built-ins, so the Function needs the Node compatibility layer to
# bundle and run. `pages_build_output_dir` points Pages at the Vite output.
name = "aldi-recipe-cart-bot"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"
